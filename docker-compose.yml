services:
  ecom:
    container_name: ecom
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - PUBLIC_BACKEND_URL=${PUBLIC_BACKEND_URL}
    image: kgnn-ecom-app:v1.0.0
    volumes:
      - astro_dist:/app/dist
    user: "101:101"  # Match Nginx user/group
    environment:
      - PUBLIC_BACKEND_URL=${PUBLIC_BACKEND_URL}
    # Comment out ports if using Nginx to serve static files directly
    ports:
      - 4321

  nginx:
    container_name: nginx
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - ecom

volumes:
  astro_dist: